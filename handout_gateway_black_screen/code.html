            <div
                class="flex flex-col items-center justify-center max-w-[800px] w-full gap-8 md:gap-12 animate-in fade-in zoom-in duration-700 ease-out">
                <!-- Main Typography Block -->
                <div class="flex flex-col items-center text-center space-y-2">
                    <h1
                        class="text-white tracking-tighter text-[15vw] sm:text-[120px] font-bold leading-[0.85] uppercase">
                        HANDOUT<span class="text-primary">.</span>
                    </h1>
                    <div class="w-full h-px bg-white/20 my-6 max-w-[120px]"></div>
                    <h2
                        class="text-white/90 tracking-[0.2em] text-sm sm:text-xl md:text-2xl font-medium leading-tight uppercase max-w-2xl">
                        SAVEHXPE <span class="mx-2 text-white/40">x</span> FREDDIE GIBBS
                    </h2>
                </div>
                <!-- Action Button -->
                <div class="flex w-full justify-center pt-8 sm:pt-12">
                    <button id="google-signin-btn"
                        class="group relative flex w-full sm:w-auto min-w-[280px] cursor-pointer items-center justify-center overflow-hidden rounded-none bg-white px-8 py-5 transition-all hover:bg-gray-200 active:scale-95">

                            <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"

                            Sign In To Unlock

                        </div>
                    </button>
                </div>
                <!-- Footer / Metadata (Subtle) -->
                <div class="absolute bottom-8 left-0 right-0 flex justify-center opacity-40">
                    <div class="flex items-center gap-2 text-[10px] uppercase tracking-widest text-white">
                        <span class="material-symbols-outlined text-[14px]">lock</span>
                        <span>Gateway // V.01</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Auth Routing Protocol -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // Dynamic Environment Sync
        // Mapped from NEXT_PUBLIC_FIREBASE_PROJECT_ID & core environment variables
        const firebaseConfig = {
            apiKey: "AIzaSyDCnutcaRoji-drYFtvDF17s4TQXlPaP0E",
            authDomain: "savehxpe-prod.firebaseapp.com",
            projectId: "savehxpe-prod",
            storageBucket: "savehxpe-prod.firebasestorage.app",
            messagingSenderId: "455262868358",
            appId: "1:455262868358:web:c98826ea5691836321d207"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Prevent double-login if already authenticated
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = '/dashboard';
            }
        });

        const signInBtn = document.getElementById('google-signin-btn');

        signInBtn.addEventListener('click', async () => {
            // Aesthetic Loading State
            const originalText = signInBtn.innerHTML;
            signInBtn.innerHTML = '<span class="relative z-10 text-black text-lg font-bold tracking-widest uppercase flex items-center gap-3">AUTHENTICATING...</span>';

            try {
                const result = await signInWithPopup(auth, provider);
                // Redirection immediately executes:
                window.location.href = '/dashboard';
            } catch (error) {
                console.error("Auth Error:", error);
                signInBtn.innerHTML = originalText;
                // Aesthetic glitch or alert could go here for failures
            }
        });
    </script>
</body>

</html>
