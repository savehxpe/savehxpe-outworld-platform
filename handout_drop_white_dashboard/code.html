<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HANDOUT Drop White Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#ffffff",
                        "background-dark": "#000000",
                        "accent-gray": "#f3f3f3"
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col antialiased">
    <!-- Main Container -->
    <div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">

        <!-- Navbar / Top Bar -->
        <header class="flex w-full items-center justify-between px-10 py-6 border-b border-black/5">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-black text-2xl">graphic_eq</span>
                <span class="text-black font-bold tracking-tight text-lg">HANDOUT</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="profile-btn"
                    class="h-8 w-8 rounded-full bg-gray-200 overflow-hidden relative cursor-pointer hover:ring-2 hover:ring-black/20 transition-all"
                    title="Sign Out">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="material-symbols-outlined text-black/40 text-lg">person</span>
                    </div>
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="layout-container flex grow flex-col items-center justify-center py-10 px-6 sm:px-12">
            <div class="layout-content-container flex flex-col max-w-[800px] w-full flex-1 justify-center">

                <!-- Welcome Section -->
                <div class="flex flex-col items-center text-center gap-2 mb-12">
                    <h1 class="text-black text-5xl md:text-7xl font-black leading-tight tracking-tighter uppercase">
                        Welcome, <span id="fan-name-display">Fan</span>
                    </h1>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="material-symbols-outlined text-black text-xl">bolt</span>
                        <p class="text-black/60 text-lg md:text-xl font-medium tracking-wide"><span
                                id="xp-display">...</span> XP MINTED</p>
                    </div>
                    <p class="text-black/30 text-xs font-mono mt-1" id="fan-id-display">#SH-LOADING</p>
                </div>

                <!-- Primary Action: Download -->
                <div class="flex justify-center mb-20">
                    <button id="download-remix-btn"
                        class="group relative flex w-full max-w-md cursor-pointer items-center justify-center overflow-hidden h-16 px-8 bg-black hover:bg-black/90 transition-all duration-300 text-white shadow-2xl hover:shadow-xl hover:-translate-y-0.5">
                        <span
                            class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></span>
                        <span class="text-lg md:text-xl font-bold tracking-wider uppercase flex items-center gap-3">
                            <span class="material-symbols-outlined text-2xl">download</span>
                            Download Remix (WAV)
                        </span>
                    </button>
                </div>

                <!-- The Vault Section (Locked) -->
                <div class="w-full mt-auto pt-10 pb-6 border-t border-black/5">
                    <div id="vault-card"
                        class="relative w-full rounded-xl bg-accent-gray/50 backdrop-blur-sm p-8 md:p-12 overflow-hidden border border-black/5">
                        <!-- Lock Overlay content -->
                        <div id="vault-content"
                            class="relative z-10 flex flex-col items-center justify-center text-center gap-4">
                            <div
                                class="h-16 w-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-2">
                                <span id="vault-icon" class="material-symbols-outlined text-black text-3xl">lock</span>
                            </div>
                            <h2 class="text-black tracking-tight text-2xl font-bold uppercase">The Vault</h2>
                            <p id="vault-description"
                                class="text-black/70 text-sm md:text-base font-medium max-w-[480px]">
                                UPGRADE TO STANDARD TO UNLOCK EXCLUSIVE ARCHIVES
                            </p>
                            <div class="mt-2">
                                <button id="vault-stems-btn"
                                    class="text-xs font-bold tracking-widest text-black underline decoration-2 underline-offset-4 hover:text-black/70 transition-colors uppercase">
                                    View Plans
                                </button>
                            </div>
                        </div>
                        <!-- Decorative blurred background -->
                        <div class="absolute -top-20 -left-20 w-64 h-64 bg-gray-200/50 rounded-full blur-3xl z-0"></div>
                        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-gray-300/30 rounded-full blur-3xl z-0">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Simple Footer -->
        <footer class="w-full py-6 text-center border-t border-black/5">
            <p id="footer-status" class="text-xs text-black/40 font-medium uppercase tracking-widest">© 2024 Handout
                Music Drop</p>
        </footer>
    </div>

    <style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>

    <!-- Firebase Integration (VoltFlow Engine) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-functions.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCnutcaRoji-drYFtvDF17s4TQXlPaP0E",
            authDomain: "savehxpe-prod.firebaseapp.com",
            projectId: "savehxpe-prod",
            storageBucket: "savehxpe-prod.firebasestorage.app",
            messagingSenderId: "455262868358",
            appId: "1:455262868358:web:c98826ea5691836321d207"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app);
        const storage = getStorage(app);

        const fanNameEl = document.getElementById('fan-name-display');
        const fanIdEl = document.getElementById('fan-id-display');
        const xpEl = document.getElementById('xp-display');
        const downloadBtn = document.getElementById('download-remix-btn');
        const vaultBtn = document.getElementById('vault-stems-btn');
        const vaultIcon = document.getElementById('vault-icon');
        const vaultDesc = document.getElementById('vault-description');
        const profileBtn = document.getElementById('profile-btn');
        const footerStatus = document.getElementById('footer-status');

        let currentTier = 'FREE';

        // ── Session Guard & Real-Time Tier Sync ──
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/gateway';
            } else {
                // Populate name from Google profile or email
                const displayName = user.displayName || user.email?.split('@')[0] || 'Fan';
                if (fanNameEl) fanNameEl.textContent = displayName.split(' ')[0];

                // Real-time Firestore watcher
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        currentTier = data.tier?.current || 'FREE';

                        if (fanIdEl) fanIdEl.textContent = `#SH-${user.uid.substring(0, 6).toUpperCase()}`;
                        if (xpEl) xpEl.textContent = data.xp?.total || 0;

                        // Vault state sync
                        if (currentTier === 'STANDARD') {
                            vaultIcon.textContent = 'lock_open';
                            vaultDesc.textContent = 'YOUR VAULT IS UNLOCKED — ACCESS STEMS & INSTRUMENTALS';
                            vaultBtn.textContent = 'Enter Vault';
                        }
                    }
                });
            }
        });

        // ── Sign Out ──
        if (profileBtn) {
            profileBtn.addEventListener('click', () => {
                signOut(auth).then(() => {
                    window.location.href = '/gateway';
                });
            });
        }

        // ── Download Master Track (Free for all authenticated users) ──
        if (downloadBtn) {
            downloadBtn.addEventListener('click', async () => {
                const btnSpan = downloadBtn.querySelector('span:last-child');
                const originalText = btnSpan.innerHTML;
                btnSpan.innerHTML = '<span class="material-symbols-outlined text-2xl animate-spin">sync</span> DECRYPTING...';
                downloadBtn.disabled = true;
                downloadBtn.classList.add('opacity-70');

                try {
                    const fileRef = ref(storage, 'handout/HANDOUT - SAVEHXPE FT FREDDIE GIBS - MIX + MASTER.wav');
                    const url = await getDownloadURL(fileRef);

                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'HANDOUT_SAVEHXPE_FREDDIE_GIBBS_REMIX.wav';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    btnSpan.innerHTML = '<span class="material-symbols-outlined text-2xl">check_circle</span> DOWNLOADED';
                    if (footerStatus) footerStatus.textContent = 'File delivered to your device';
                    setTimeout(() => {
                        btnSpan.innerHTML = originalText;
                        downloadBtn.disabled = false;
                        downloadBtn.classList.remove('opacity-70');
                    }, 3000);
                } catch (error) {
                    console.error("Download Error:", error);
                    btnSpan.innerHTML = '<span class="material-symbols-outlined text-2xl">error</span> ERROR';
                    if (footerStatus) footerStatus.textContent = `Error: ${error.code || error.message}`;
                    setTimeout(() => {
                        btnSpan.innerHTML = originalText;
                        downloadBtn.disabled = false;
                        downloadBtn.classList.remove('opacity-70');
                    }, 3000);
                }
            });
        }

        // ── Vault Stems Paywall (Stripe Checkout) ──
        if (vaultBtn) {
            vaultBtn.addEventListener('click', async () => {
                if (currentTier === 'FREE') {
                    const originalText = vaultBtn.textContent;
                    vaultBtn.textContent = 'INITIATING CHECKOUT...';

                    try {
                        const createCheckoutSession = httpsCallable(functions, 'createCheckoutSession');
                        const { data } = await createCheckoutSession({ priceId: 'price_1NxyZ2SaveHxpeStdMo' });
                        if (data.url) {
                            window.location.href = data.url;
                        } else {
                            throw new Error("No checkout URL");
                        }
                    } catch (error) {
                        console.error("Stripe Error:", error);
                        vaultBtn.textContent = 'CHECKOUT ERROR';
                        if (footerStatus) footerStatus.textContent = `Error: ${error.code || error.message}`;
                        setTimeout(() => { vaultBtn.textContent = originalText; }, 3000);
                    }
                } else {
                    // STANDARD user — vault access
                    alert("Vault access active. Stems section coming soon.");
                }
            });
        }
    </script>
</body>

</html>
